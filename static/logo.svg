<svg width="920" height="315" viewBox="0 0 920 315" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pinGrad" x1="12" y1="12" x2="206" y2="294" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8DDCF8"/>
      <stop offset="0.42" stop-color="#2A96F3"/>
      <stop offset="1" stop-color="#1230B8"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="605" y1="52" x2="810" y2="198" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A4DC3C"/>
      <stop offset="1" stop-color="#56AB15"/>
    </linearGradient>
    <linearGradient id="greenTagGrad" x1="241" y1="248" x2="820" y2="308" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A4DC3C"/>
      <stop offset="1" stop-color="#56AB15"/>
    </linearGradient>
  </defs>

  <!-- Pin: smooth elongated teardrop, aspect ~1.37:1 -->
  <path d="M109,12 C163,12 206,55 206,115 C206,175 148,242 109,294 C70,242 12,175 12,115 C12,55 55,12 109,12 Z" fill="url(#pinGrad)"/>

  <!-- L: thin (23px bar), tall vertical (146px), sharp right-angle corners, no curves -->
  <path d="M60,44 L83,44 L83,190 L165,190 L165,212 L60,212 Z" fill="#FFFFFF"/>

  <!-- Brand name: large and prominent -->
  <text x="238" y="193" fill="#1C2430" font-size="156" font-family="'Sora', Inter, Arial, sans-serif" font-weight="800" letter-spacing="-4">Listo</text>
  <text x="605" y="193" fill="url(#greenGrad)" font-size="156" font-family="'Sora', Inter, Arial, sans-serif" font-weight="800" letter-spacing="-4">jo</text>

  <!-- Tagline: well below brand name, clear breathing room -->
  <text x="241" y="288" font-size="52" font-family="'Sora', Inter, Arial, sans-serif" font-weight="700" letter-spacing="-0.2">
    <tspan fill="#1C2430">List It. Find It. </tspan><tspan fill="url(#greenTagGrad)">Go.</tspan>
  </text>
</svg>
