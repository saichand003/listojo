<svg width="900" height="310" viewBox="0 0 900 310" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Pin: sky blue upper-left → vivid blue → deep navy at tip -->
    <linearGradient id="pinGrad" x1="45" y1="10" x2="265" y2="295" gradientUnits="userSpaceOnUse">
      <stop stop-color="#87D4F8"/>
      <stop offset="0.40" stop-color="#2A96F3"/>
      <stop offset="1" stop-color="#1038C0"/>
    </linearGradient>
    <!-- "jo": lime green top → forest green bottom (covers cap-height to baseline) -->
    <linearGradient id="greenGrad" x1="0" y1="78" x2="0" y2="190" gradientUnits="userSpaceOnUse">
      <stop stop-color="#82C424"/>
      <stop offset="1" stop-color="#4A9A10"/>
    </linearGradient>
    <!-- "Go." in tagline: same green range, scaled to tagline text height -->
    <linearGradient id="greenTagGrad" x1="0" y1="238" x2="0" y2="278" gradientUnits="userSpaceOnUse">
      <stop stop-color="#82C424"/>
      <stop offset="1" stop-color="#4A9A10"/>
    </linearGradient>
  </defs>

  <!-- Location pin: smooth teardrop, width 220px, height 285px -->
  <path d="M155,10 C215,10 265,62 265,127 C265,192 197,265 155,295 C113,265 45,192 45,127 C45,62 95,10 155,10 Z" fill="url(#pinGrad)"/>

  <!-- White L: vertical bar 58px wide, horizontal bar 55px tall, sharp corners -->
  <path d="M85,48 L143,48 L143,165 L218,165 L218,220 L85,220 Z" fill="#FFFFFF"/>

  <!-- Brand name: "Listo" dark navy, "jo" green gradient — tspan auto-positions -->
  <text x="300" y="190" font-size="155" font-family="'Sora', Inter, Arial, sans-serif" font-weight="800" letter-spacing="-3">
    <tspan fill="#1C2430">Listo</tspan><tspan fill="url(#greenGrad)">jo</tspan>
  </text>

  <!-- Tagline: "List It. Find It. " navy + "Go." green, well separated below -->
  <text x="302" y="278" font-size="55" font-family="'Sora', Inter, Arial, sans-serif" font-weight="700" letter-spacing="-0.2">
    <tspan fill="#1C2430">List It. Find It. </tspan><tspan fill="url(#greenTagGrad)">Go.</tspan>
  </text>
</svg>
