<svg width="900" height="275" viewBox="0 0 900 275" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- ── ICON ─────────────────────────────────────── -->

  <!-- Pale mint location pin -->
  <path d="M130,12 C161,12 187,38 187,70 C187,102 160,137 130,156 C100,137 73,102 73,70 C73,38 99,12 130,12 Z"
        fill="#C8E8D8"/>

  <!-- Dark green dot inside pin -->
  <circle cx="130" cy="69" r="21" fill="#2B7A54"/>

  <!-- Thin connector from pin tip to L-bracket -->
  <rect x="128" y="156" width="5" height="20" rx="2" fill="#3D8C65"/>

  <!-- L-bracket: thick corner (vertical-left + horizontal-bottom) -->
  <path d="M102,175 L102,213 L150,213"
        stroke="#2B7A54" stroke-width="8" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>

  <!-- Three list lines: short→long, dark→light -->
  <line x1="102" y1="228" x2="145" y2="228" stroke="#2B7A54" stroke-width="7" stroke-linecap="round"/>
  <line x1="102" y1="243" x2="163" y2="243" stroke="#5CAE80" stroke-width="7" stroke-linecap="round"/>
  <line x1="102" y1="258" x2="184" y2="258" stroke="#90C8A8" stroke-width="7" stroke-linecap="round"/>

  <!-- ── DIVIDER ─────────────────────────────────── -->
  <line x1="212" y1="8" x2="212" y2="267" stroke="#C8C8C8" stroke-width="1.5"/>

  <!-- ── TEXT ──────────────────────────────────────── -->

  <!-- Brand name: "listo" dark charcoal + "jo" dark green (tspan = auto-positioned) -->
  <text x="238" y="172" font-size="122" font-family="'Sora', sans-serif" font-weight="800" letter-spacing="-1">
    <tspan fill="#1E1E1E">listo</tspan><tspan fill="#2B7A54">jo</tspan>
  </text>

  <!-- Tagline -->
  <text x="241" y="228" fill="#888888" font-size="32" font-family="'Sora', sans-serif" font-weight="500" letter-spacing="3">FIND · LIST · DISCOVER</text>

</svg>
