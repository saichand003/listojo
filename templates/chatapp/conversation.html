{% extends 'base.html' %}
{% block content %}
<h1>Conversation with {{ other_user.username }}</h1>
<div class="card">
    {% for msg in messages %}
        <p>
            <strong>{{ msg.sender.username }}:</strong>
            {{ msg.message }}
            <small>({{ msg.sent_at }})</small>
        </p>
    {% empty %}
        <p>No messages yet.</p>
    {% endfor %}
</div>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Send</button>
</form>
{% endblock %}
