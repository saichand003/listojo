<svg width="900" height="310" viewBox="0 0 900 310" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pinGrad" x1="10" y1="10" x2="220" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6FC8F5"/>
      <stop offset="0.40" stop-color="#2B96F3"/>
      <stop offset="1" stop-color="#1538C2"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="606" y1="48" x2="810" y2="196" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9CD43C"/>
      <stop offset="1" stop-color="#5AAE18"/>
    </linearGradient>
    <linearGradient id="greenTagGrad" x1="255" y1="246" x2="820" y2="305" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9CD43C"/>
      <stop offset="1" stop-color="#5AAE18"/>
    </linearGradient>
  </defs>

  <!-- Location pin: smooth rounded teardrop -->
  <path d="M120,10 C176,10 220,52 220,112 C220,172 162,238 120,300 C78,238 20,172 20,112 C20,52 64,10 120,10 Z" fill="url(#pinGrad)"/>

  <!-- White L inside pin: bold proportions matching brand reference -->
  <!-- Vertical bar: 48px wide, 174px tall; horizontal foot: 115px wide, 48px tall -->
  <path d="M60,38 L108,38 L108,164 L175,164 L175,212 L60,212 Z" fill="#FFFFFF"/>

  <!-- Brand name: "Listo" dark navy, "jo" green -->
  <text x="255" y="192" fill="#1C2430" font-size="148" font-family="'Sora', Inter, Arial, sans-serif" font-weight="800" letter-spacing="-3">Listo</text>
  <text x="606" y="192" fill="url(#greenGrad)" font-size="148" font-family="'Sora', Inter, Arial, sans-serif" font-weight="800" letter-spacing="-3">jo</text>

  <!-- Tagline: clearly spaced below brand name, "Go." in green -->
  <text x="258" y="287" font-size="54" font-family="'Sora', Inter, Arial, sans-serif" font-weight="700" letter-spacing="-0.2">
    <tspan fill="#1C2430">List It. Find It. </tspan><tspan fill="url(#greenTagGrad)">Go.</tspan>
  </text>
</svg>
