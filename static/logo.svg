<svg width="960" height="330" viewBox="0 0 960 330" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pinGrad" x1="73" y1="12" x2="279" y2="295" gradientUnits="userSpaceOnUse">
      <stop stop-color="#79D2F6"/>
      <stop offset="0.44" stop-color="#2A96F3"/>
      <stop offset="1" stop-color="#1338C0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="644" y1="55" x2="840" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A0D83E"/>
      <stop offset="1" stop-color="#5AAE18"/>
    </linearGradient>
    <linearGradient id="greenTagGrad" x1="311" y1="256" x2="820" y2="316" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A0D83E"/>
      <stop offset="1" stop-color="#5AAE18"/>
    </linearGradient>
  </defs>

  <!-- Pin: tall elongated teardrop (aspect ~1.37:1 height:width) -->
  <path d="M176,12 C236,12 279,55 279,115 C279,175 220,242 176,295 C132,242 73,175 73,115 C73,55 116,12 176,12 Z" fill="url(#pinGrad)"/>

  <!-- L: thin clean letter — 23px bar width, 148px tall vertical, sharp right-angle corners -->
  <path d="M120,48 L143,48 L143,196 L228,196 L228,219 L120,219 Z" fill="#FFFFFF"/>

  <!-- Brand name: "Listo" dark navy, "jo" green gradient -->
  <text x="308" y="198" fill="#1C2430" font-size="142" font-family="'Sora', Inter, Arial, sans-serif" font-weight="800" letter-spacing="-3">Listo</text>
  <text x="644" y="198" fill="url(#greenGrad)" font-size="142" font-family="'Sora', Inter, Arial, sans-serif" font-weight="800" letter-spacing="-3">jo</text>

  <!-- Tagline: pushed down with clear gap above — no overlap -->
  <text x="311" y="306" font-size="58" font-family="'Sora', Inter, Arial, sans-serif" font-weight="700" letter-spacing="-0.3">
    <tspan fill="#1C2430">List It. Find It. </tspan><tspan fill="url(#greenTagGrad)">Go.</tspan>
  </text>
</svg>
